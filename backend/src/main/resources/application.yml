spring:
  threads:
    virtual:
      enabled: true

server:
  port: 8080

rsgcs:
  # More tolerant heartbeat timeout to avoid false LOST/RECONNECT
  # with Docker and A* pathfinding load. STALE > 1500ms, LOST > 3000ms.
  heartbeat-timeout-ms: 1500
  heartbeat-check-interval-ms: 200
  # High-frequency swarm broadcast interval for smooth map updates
  broadcast-interval-ms: 100
  max-drones: 10
  election-timeout-ms: 300
  udp-port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health
